services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: ${MONGO_URI}
      GROQ_API_KEY: ${GROQ_API_KEY}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8080}
      ADMIN_URL: ${ADMIN_URL:-http://localhost:8081}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL_FRONTEND:-http://localhost:5000}
    container_name: portfolio-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL_ADMIN:-http://localhost:5000}
        VITE_ADMIN_PASSWORD: ${VITE_ADMIN_PASSWORD}
    container_name: portfolio-admin
    ports:
      - "8081:80"
    depends_on:
      - backend
